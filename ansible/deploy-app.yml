---
- name: Deploy Node.js application
  hosts: all
  become: yes

  tasks:

    - name: Install Node.js and Git
      yum:
        name:
          - nodejs
          - git
        state: present

    - name: Clone application repository
      git:
        repo: https://github.com/satishpathade/three-tier-architecture-iac.git
        dest: /home/ec2-user/nodeapp

    - name: Install dependencies
      command: npm install
      args:
        chdir: /home/ec2-user/nodeapp

    - name: Start application
      command: nohup npm start &
      args:
        chdir: /home/ec2-user/nodeapp